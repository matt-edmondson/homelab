name: Build runner image

on:
  push:
    branches: [main]
    paths:
      - 'runner-image/**'
      - '.github/workflows/build-runner-image.yml'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/homelab-runner
  RUNNER_BASE_VERSION: "2.333.1"
  OVERLAY_REVISION: "2"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RUNNER_BASE_VERSION }}-${{ env.OVERLAY_REVISION }}
            type=raw,value=${{ env.RUNNER_BASE_VERSION }}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ./runner-image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
